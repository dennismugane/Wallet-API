# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Application ─────────────────────────────────────────────────────────────
spring.application.name=muigo-wallet

# ── Database ─────────────────────────────────────────────────────────────────
# These are overridden by environment variables in Docker / Kubernetes.
# Never hardcode credentials — use secrets management in production.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wallet_db}
spring.datasource.username=${DB_USERNAME:wallet_user}
spring.datasource.password=${DB_PASSWORD:wallet_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway (DB migrations) ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ──────────────────────────────────────────────────────────────────────
# In production, inject via Kubernetes Secret or AWS Secrets Manager.
# Must be at least 32 characters for HS256.
app.jwt.secret=${JWT_SECRET:muigo-wallet-super-secret-key-change-in-production-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Actuator / Observability ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.tracing.sampling.probability=1.0

# ── Logging ──────────────────────────────────────────────────────────────────
# JSON structured logging — essential for log aggregators (ELK, Loki)
logging.structured.format.console=ecs
logging.level.com.muigo.wallet=INFO
logging.level.org.springframework.security=WARN

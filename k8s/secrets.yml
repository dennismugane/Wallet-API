# k8s/secrets.yml
# IMPORTANT: Never commit real values to git.
# In production, use Sealed Secrets, External Secrets Operator,
# or inject via CI/CD pipeline from a secrets manager (AWS Secrets Manager, Vault).
#
# To create from CLI (base64-encode the values):
#   kubectl create secret generic muigo-wallet-secrets \
#     --from-literal=db-url='jdbc:postgresql://your-db-host:5432/wallet_db' \
#     --from-literal=db-username='wallet_user' \
#     --from-literal=db-password='YOUR_SECURE_PASSWORD' \
#     --from-literal=jwt-secret='YOUR_32_CHAR_SECRET'

apiVersion: v1
kind: Secret
metadata:
  name: muigo-wallet-secrets
  namespace: default
type: Opaque
data:
  # Values must be base64-encoded: echo -n 'value' | base64
  db-url: REPLACE_WITH_BASE64_ENCODED_VALUE
  db-username: REPLACE_WITH_BASE64_ENCODED_VALUE
  db-password: REPLACE_WITH_BASE64_ENCODED_VALUE
  jwt-secret: REPLACE_WITH_BASE64_ENCODED_VALUE
